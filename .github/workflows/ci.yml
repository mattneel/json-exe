name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: the editor/playground typechecks resolve the workspace
      # packages via their built dist (.d.ts), so they must exist beforehand.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: |
          pnpm typecheck
          pnpm --filter @json-exe/editor typecheck
          pnpm --filter @json-exe/playground typecheck

      - name: Test
        run: pnpm test
